// ── Helpers ──
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});}
function daysUntil(ds){return Math.max(0,Math.ceil((new Date(ds)-new Date())/86400000));}
function getDays(y,m){return new Date(y,m+1,0).getDate();}
function getFirstDay(y,m){return new Date(y,m,1).getDay();}
function tods(y,m,d){return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}

// ── MacroBar ──
function MacroBar({label,value,max,color,unit="g"}){
  const pct=Math.min((value/max)*100,100),over=value>max;
  return <div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}>
      <span style={{color:"#999"}}>{label}</span>
      <span style={{color:over?"#e53e3e":"#444"}}>{value}{unit} <span style={{color:"#ccc"}}>/ {max}{unit}</span></span>
    </div>
    <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${pct}%`,background:over?"#fc8181":color,borderRadius:3,transition:"width .5s"}}/>
    </div>
  </div>;
}

// ── CalGrid ──
function CalGrid({year,month,onPrev,onNext,renderDay}){
  const days=getDays(year,month),first=getFirstDay(year,month);
  const mn=new Date(year,month,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"});
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <button onClick={onPrev} style={{background:"transparent",border:"1px solid #ebebeb",color:"#aaa",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>‹</button>
      <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:"#1a1a1a"}}>{mn}</span>
      <button onClick={onNext} style={{background:"transparent",border:"1px solid #ebebeb",color:"#aaa",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
      {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontFamily:"monospace",color:"#bbb",padding:"3px 0"}}>{d}</div>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
      {cells.map((day,i)=><div key={i}>{day?renderDay(day,year,month):<div/>}</div>)}
    </div>
  </div>;
}

// ── MealCard ──
function MealCard({meal,onDelete}){
  const [open,setOpen]=useState(false);
  return <div onClick={()=>setOpen(!open)} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",boxShadow:open?"0 2px 12px rgba(0,0,0,.06)":"0 1px 3px rgba(0,0,0,.04)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <span style={{fontFamily:"monospace",fontSize:10,color:"#bbb"}}>{meal.time}</span>
          <span style={{fontWeight:700,color:"#1a1a1a",fontSize:14,fontFamily:"'Syne',sans-serif"}}>{meal.name}</span>
        </div>
        <p style={{margin:"3px 0 0",fontSize:11,color:"#aaa",lineHeight:1.4,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"85%"}}>{meal.description}</p>
      </div>
      <div style={{textAlign:"right",marginLeft:10,flexShrink:0}}>
        <div style={{fontSize:20,fontWeight:800,color:"#1a1a1a",fontFamily:"'Syne',sans-serif",lineHeight:1}}>{meal.macros.calories}</div>
        <div style={{fontSize:8,color:"#ccc",fontFamily:"monospace"}}>KCAL</div>
      </div>
    </div>
    {open&&<div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #f0f0f0"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
        {[{l:"Protein",v:meal.macros.protein,c:"#16a34a"},{l:"Carbs",v:meal.macros.carbs,c:"#2563eb"},{l:"Fat",v:meal.macros.fat,c:"#ea580c"},{l:"Fiber",v:meal.macros.fiber||0,c:"#7c3aed"}].map(m=>
          <div key={m.l} style={{background:"#fafafa",borderRadius:8,padding:"8px 6px",textAlign:"center",border:"1px solid #f0f0f0"}}>
            <div style={{fontSize:15,fontWeight:700,color:m.c,fontFamily:"'Syne',sans-serif"}}>{m.v}g</div>
            <div style={{fontSize:8,color:"#bbb",fontFamily:"monospace"}}>{m.l.toUpperCase()}</div>
          </div>)}
      </div>
      <button onClick={e=>{e.stopPropagation();onDelete(meal.id);}} style={{width:"100%",background:"transparent",border:"1px solid #fee2e2",color:"#fca5a5",borderRadius:6,padding:"5px 0",fontSize:10,fontFamily:"monospace",cursor:"pointer"}}>REMOVE</button>
    </div>}
  </div>;
}

// ── WorkoutView ──
function WorkoutView({planKey,loggedSets,onLogSet}){
  const [openBlock,setOpenBlock]=useState(null);
  const p=WP[planKey];if(!p)return null;
  const totalDone=Object.values(loggedSets||{}).reduce((a,s)=>a+(s||0),0);
  const totalSets=p.blocks.reduce((a,b)=>a+b.exercises.reduce((x,e)=>x+e.sets,0),0);
  return <div>
    <div style={{background:p.light,border:`1px solid ${p.border}`,borderRadius:16,padding:16,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:9,fontFamily:"monospace",color:p.color,letterSpacing:2,marginBottom:4,opacity:.7}}>TODAY'S SESSION</div>
          <div style={{fontSize:22,fontWeight:800,fontFamily:"'Syne',sans-serif",color:p.color}}>{p.emoji} {p.label}</div>
          <div style={{fontSize:10,fontFamily:"monospace",color:p.color,opacity:.6,marginTop:2}}>⏱ {p.timing}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"'Syne',sans-serif",color:p.color}}>{totalDone}/{totalSets}</div>
          <div style={{fontSize:8,fontFamily:"monospace",color:p.color,opacity:.6}}>SETS DONE</div>
        </div>
      </div>
      <div style={{marginTop:10,height:6,background:"rgba(0,0,0,.08)",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${totalSets?(totalDone/totalSets)*100:0}%`,background:p.color,borderRadius:3,transition:"width .4s"}}/>
      </div>
    </div>
    {p.warmup.length>0&&<div className="card-sm" style={{marginBottom:10}}>
      <div className="section-label">WARM-UP</div>
      {p.warmup.map((w,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:"#e0e0e0",flexShrink:0}}/>
        <span style={{fontSize:12,color:"#555"}}>{w}</span>
      </div>)}
    </div>}
    {p.blocks.map((block,bi)=><div key={bi} style={{background:"#fff",border:"1px solid #ebebeb",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
      <div onClick={()=>setOpenBlock(openBlock===bi?null:bi)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontWeight:700,fontFamily:"'Syne',sans-serif",fontSize:15,color:"#1a1a1a"}}>{block.name}</div>
          <div style={{fontSize:10,color:"#bbb",fontFamily:"monospace",marginTop:2}}>{block.note}</div>
        </div>
        <span style={{color:"#ccc",fontSize:16}}>{openBlock===bi?"▲":"▼"}</span>
      </div>
      {openBlock===bi&&<div style={{borderTop:"1px solid #f5f5f5",padding:"10px 14px 14px"}}>
        {block.exercises.map((ex,ei)=>{
          const key=`${bi}-${ei}`,done=loggedSets?.[key]||0;
          return <div key={ei} style={{marginBottom:12,paddingBottom:12,borderBottom:ei<block.exercises.length-1?"1px solid #f8f8f8":"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a"}}>{ex.name}</div>
                <div style={{fontSize:10,fontFamily:"monospace",color:"#bbb",marginTop:1}}>{ex.sets} sets · {ex.reps} reps</div>
              </div>
              <div style={{fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,color:done>=ex.sets?p.color:"#ccc"}}>{done}/{ex.sets}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {Array.from({length:ex.sets}).map((_,si)=><button key={si}
                onClick={()=>onLogSet(key,si<done?si:si+1)}
                style={{width:36,height:36,borderRadius:8,cursor:"pointer",background:si<done?p.light:"#f5f5f5",border:si<done?`1.5px solid ${p.border}`:"1.5px solid #ebebeb",color:si<done?p.color:"#ccc",fontSize:14,fontWeight:700,transition:"all .15s"}}>
                {si<done?"✓":si+1}
              </button>)}
              {done>0&&<button onClick={()=>onLogSet(key,0)} style={{fontSize:10,fontFamily:"monospace",background:"none",border:"none",color:"#ddd",cursor:"pointer"}}>reset</button>}
            </div>
          </div>;
        })}
      </div>}
    </div>)}
    {p.core.length>0&&<div className="card-sm" style={{marginBottom:10}}>
      <div className="section-label">CORE</div>
      {p.core.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:"#e0e0e0",flexShrink:0}}/>
        <span style={{fontSize:12,color:"#555"}}>{c}</span>
      </div>)}
    </div>}
    {p.cooldown.length>0&&<div className="card-sm">
      <div className="section-label">COOLDOWN</div>
      {p.cooldown.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:"#e0e0e0",flexShrink:0}}/>
        <span style={{fontSize:12,color:"#555"}}>{c}</span>
      </div>)}
    </div>}
  </div>;
}

// ── Main App ──
function App(){
  const [tab,setTab]=useState("workout");
  const [viewDate,setViewDate]=useState(TODAY);
  const now=new Date();
  const [calMonth,setCalMonth]=useState({y:now.getFullYear(),m:now.getMonth()});

  // Persistent state — all loaded from localStorage immediately
  const [allDays,setAllDays]=useState(()=>LS.get("td-days")||{});
  const [gymData,setGymData]=useState(()=>LS.get("td-gym")||{sessions:38,gymDates:{}});
  const [workoutLog,setWorkoutLog]=useState(()=>LS.get("td-wlog")||{});
  const [stepsData,setStepsData]=useState(()=>LS.get("td-steps")||{});

  // Save helpers — save immediately on every change
  function saveDays(u){setAllDays(u);LS.set("td-days",u);}
  function saveGym(u){setGymData(u);LS.set("td-gym",u);}
  function saveWLog(u){setWorkoutLog(u);LS.set("td-wlog",u);}
  function saveSteps(u){setStepsData(u);LS.set("td-steps",u);}

  // Meal form
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",time:"",description:""});
  const [macros,setMacros]=useState({calories:"",protein:"",carbs:"",fat:"",fiber:""});
  const [foodSearch,setFoodSearch]=useState("");
  const [searchRes,setSearchRes]=useState([]);
  const [formErr,setFormErr]=useState("");

  // Steps
  const [stepInput,setStepInput]=useState("");
  useEffect(()=>{setStepInput(stepsData[viewDate]?String(stepsData[viewDate]):"");},[viewDate]);

  // Picking workout
  const [pickingPlan,setPickingPlan]=useState(false);

  const todayMeals=allDays[viewDate]?.meals||[];
  const totals=todayMeals.reduce((a,m)=>({
    calories:a.calories+(m.macros.calories||0),protein:a.protein+(m.macros.protein||0),
    carbs:a.carbs+(m.macros.carbs||0),fat:a.fat+(m.macros.fat||0),fiber:a.fiber+(m.macros.fiber||0)
  }),{calories:0,protein:0,carbs:0,fat:0,fiber:0});

  function addMeal(){
    const cal=parseInt(macros.calories)||0;
    if(!form.name&&!form.description){setFormErr("Add meal name or description.");return;}
    if(!cal){setFormErr("Enter calories.");return;}
    const meal={id:Date.now(),name:form.name||form.description,time:form.time||new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:false}),description:form.description||form.name,
      macros:{calories:cal,protein:parseInt(macros.protein)||0,carbs:parseInt(macros.carbs)||0,fat:parseInt(macros.fat)||0,fiber:parseInt(macros.fiber)||0},micros:{}};
    saveDays({...allDays,[viewDate]:{meals:[...todayMeals,meal]}});
    setForm({name:"",time:"",description:""});setMacros({calories:"",protein:"",carbs:"",fat:"",fiber:""});
    setFoodSearch("");setSearchRes([]);setAdding(false);setFormErr("");
  }

  function deleteMeal(id){saveDays({...allDays,[viewDate]:{meals:todayMeals.filter(m=>m.id!==id)}});}

  function toggleGym(ds){
    const on=gymData.gymDates[ds],nd={...gymData.gymDates};
    if(on){delete nd[ds];saveGym({sessions:gymData.sessions-1,gymDates:nd});}
    else{nd[ds]=true;saveGym({sessions:gymData.sessions+1,gymDates:nd});}
  }

  function selectPlan(key){
    saveWLog({...workoutLog,[viewDate]:{plan:key,sets:workoutLog[viewDate]?.sets||{}}});
    if(!gymData.gymDates[viewDate]){const nd={...gymData.gymDates,[viewDate]:true};saveGym({sessions:gymData.sessions+1,gymDates:nd});}
    setPickingPlan(false);
  }

  function logSet(ds,key,val){
    const cur=workoutLog[ds]||{plan:null,sets:{}};
    saveWLog({...workoutLog,[ds]:{...cur,sets:{...cur.sets,[key]:val}}});
  }

  function foodColor(ds){
    const ms=allDays[ds]?.meals||[];if(!ms.length)return null;
    const cal=ms.reduce((a,m)=>a+(m.macros.calories||0),0);
    const prot=ms.reduce((a,m)=>a+(m.macros.protein||0),0);
    if(cal>DAILY_GOALS.calories)return{bg:"#fef2f2",dot:"#ef4444",text:"#b91c1c"};
    if(prot>=DAILY_GOALS.protein)return{bg:"#dcfce7",dot:"#22c55e",text:"#15803d"};
    return{bg:"#fef9c3",dot:"#eab308",text:"#a16207"};
  }

  function navDate(delta){
    const d=new Date(viewDate+"T12:00:00");d.setDate(d.getDate()+delta);
    const nd=d.toISOString().split("T")[0];if(nd<=TODAY)setViewDate(nd);
  }

  const navBar=<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
    <button onClick={()=>navDate(-1)} style={{background:"transparent",border:"none",color:"#bbb",fontFamily:"monospace",fontSize:10,cursor:"pointer",padding:"4px 8px"}}>‹ PREV</button>
    <span style={{fontFamily:"monospace",fontSize:11,color:"#aaa"}}>{viewDate===TODAY?"TODAY":fmtDate(viewDate)}</span>
    <button onClick={()=>navDate(1)} style={{background:"transparent",border:"none",color:"#bbb",fontFamily:"monospace",fontSize:10,cursor:"pointer",padding:"4px 8px",opacity:viewDate===TODAY?.25:1,pointerEvents:viewDate===TODAY?"none":"auto"}}>NEXT ›</button>
  </div>;

  // steps weekly
  const vd=new Date(viewDate+"T12:00:00"),dow=vd.getDay();
  const mon=new Date(vd);mon.setDate(vd.getDate()-(dow===0?6:dow-1));
  const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split("T")[0];});
  const weekSteps=weekDates.reduce((a,d)=>a+(stepsData[d]||0),0);
  const todaySteps=stepsData[viewDate]||0;
  const isWknd=[0,6].includes(new Date(viewDate+"T12:00:00").getDay());
  const dayGoal=isWknd?STEP_GOALS.weekend:STEP_GOALS.day;

  const sessLeft70=Math.max(0,GYM_JUNE-gymData.sessions);
  const sessLeft200=Math.max(0,GYM_YEAR-gymData.sessions);
  const dJ=daysUntil("2026-06-30"),dY=daysUntil("2026-12-31");
  const pJ=Math.min((gymData.sessions/GYM_JUNE)*100,100);
  const pY=Math.min((gymData.sessions/GYM_YEAR)*100,100);

  return <div style={{minHeight:"100vh",background:"#f5f5f2"}}>
    {/* Header */}
    <div style={{background:"#fff",borderBottom:"1px solid #ebebeb",padding:"20px 18px 14px"}}>
      <div style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",color:"#ccc",letterSpacing:2,marginBottom:3}}>TUSHAR / TRACKER</div>
      <div style={{fontSize:20,fontWeight:800,fontFamily:"'Syne',sans-serif",color:"#111"}}>
        {tab==="gym"?"GYM LOG":tab==="history"?"HISTORY":fmtDate(viewDate)}
      </div>
    </div>

    {/* Tabs */}
    <div className="tab-bar">
      {[["workout","🏋️ WORKOUT"],["food","🥗 FOOD"],["steps","👟 STEPS"],["gym","📊 PROGRESS"],["history","📅 HISTORY"]].map(([k,l])=>
        <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>)}
    </div>

    <div style={{padding:"16px 18px"}}>

    {/* ── WORKOUT TAB ── */}
    {tab==="workout"&&<>
      {navBar}
      {!workoutLog[viewDate]&&!pickingPlan&&<div className="card" style={{textAlign:"center",padding:"24px 18px"}}>
        <div style={{fontSize:32,marginBottom:8}}>🏋️</div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:17,marginBottom:4}}>What's today's workout?</div>
        <div style={{fontFamily:"monospace",fontSize:10,color:"#bbb",marginBottom:18}}>Select a day type to start tracking</div>
        <button onClick={()=>setPickingPlan(true)} style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,cursor:"pointer"}}>SELECT WORKOUT DAY</button>
      </div>}
      {pickingPlan&&<div className="card">
        <div className="section-label" style={{marginBottom:14}}>PICK DAY TYPE</div>
        {Object.entries(WP).map(([k,p])=><button key={k} onClick={()=>selectPlan(k)} style={{width:"100%",background:p.light,border:`1px solid ${p.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:p.color}}>{p.emoji} Day {k} — {p.label}</div>
            <div style={{fontFamily:"monospace",fontSize:9,color:p.color,opacity:.7,marginTop:2}}>{p.timing}</div>
          </div>
          <span style={{color:p.color,fontSize:16}}>→</span>
        </button>)}
        <button onClick={()=>setPickingPlan(false)} style={{width:"100%",marginTop:4,background:"transparent",border:"1px solid #ebebeb",borderRadius:8,padding:8,fontFamily:"monospace",fontSize:10,color:"#bbb",cursor:"pointer"}}>CANCEL</button>
      </div>}
      {workoutLog[viewDate]&&<>
        <WorkoutView planKey={workoutLog[viewDate].plan} loggedSets={workoutLog[viewDate].sets} onLogSet={(k,v)=>logSet(viewDate,k,v)}/>
        <button onClick={()=>{if(window.confirm("Clear workout?"))saveWLog({...workoutLog,[viewDate]:undefined});}} style={{width:"100%",background:"transparent",border:"1px solid #fee2e2",color:"#fca5a5",borderRadius:8,padding:10,fontFamily:"monospace",fontSize:10,cursor:"pointer",marginTop:4}}>CHANGE / CLEAR WORKOUT</button>
      </>}
    </>}

    {/* ── FOOD TAB ── */}
    {tab==="food"&&<>
      {navBar}
      {/* Summary */}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <div style={{fontSize:38,fontWeight:800,fontFamily:"'Syne',sans-serif",lineHeight:1}}>{totals.calories}</div>
            <div style={{fontSize:9,color:"#ccc",fontFamily:"monospace",letterSpacing:1.5}}>KCAL TODAY</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:22,fontWeight:700,fontFamily:"'Syne',sans-serif",lineHeight:1,color:totals.calories>DAILY_GOALS.calories?"#ef4444":"#16a34a"}}>{Math.abs(DAILY_GOALS.calories-totals.calories)}</div>
            <div style={{fontSize:9,color:"#ccc",fontFamily:"monospace",marginTop:2}}>{totals.calories>DAILY_GOALS.calories?"OVER":"REMAINING"}</div>
          </div>
        </div>
        <MacroBar label="CALORIES" value={totals.calories} max={DAILY_GOALS.calories} color="#f59e0b" unit="kcal"/>
        <MacroBar label="PROTEIN" value={totals.protein} max={DAILY_GOALS.protein} color="#16a34a"/>
        <MacroBar label="CARBS" value={totals.carbs} max={DAILY_GOALS.carbs} color="#2563eb"/>
        <MacroBar label="FAT" value={totals.fat} max={DAILY_GOALS.fat} color="#ea580c"/>
        <MacroBar label="FIBER" value={totals.fiber} max={DAILY_GOALS.fiber} color="#7c3aed"/>
      </div>
      {/* Food calendar */}
      <div className="card">
        <div className="section-label">NUTRITION CALENDAR</div>
        <CalGrid year={calMonth.y} month={calMonth.m}
          onPrev={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()};})}
          onNext={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1);if(d<=new Date())return{y:d.getFullYear(),m:d.getMonth()};return p;})}
          renderDay={(day,y,m)=>{
            const ds=tods(y,m,day),col=foodColor(ds),sel=ds===viewDate,fut=ds>TODAY;
            return <div onClick={()=>{if(!fut)setViewDate(ds);}} style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,fontSize:11,fontFamily:"monospace",cursor:fut?"default":"pointer",background:col?col.bg:ds===TODAY?"#f0fdf4":"transparent",color:col?col.text:ds===TODAY?"#16a34a":fut?"#e0e0e0":"#555",fontWeight:sel?700:400,border:sel?"2px solid #16a34a":"2px solid transparent",transition:"all .15s"}}>{day}</div>;
          }}/>
        <div style={{display:"flex",gap:10,marginTop:12,justifyContent:"center",flexWrap:"wrap"}}>
          {[["#dcfce7","#16a34a","✓ Goal met"],["#fef9c3","#ca8a04","Low protein"],["#fef2f2","#ef4444","Over 1750"]].map(([bg,dot,lbl])=>
            <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:10,height:10,borderRadius:3,background:bg,border:`1px solid ${dot}`}}/>
              <span style={{fontSize:9,fontFamily:"monospace",color:"#bbb"}}>{lbl}</span>
            </div>)}
        </div>
      </div>
      {/* Meals */}
      <div className="section-label">MEALS · {todayMeals.length}</div>
      {todayMeals.map(m=><MealCard key={m.id} meal={m} onDelete={deleteMeal}/>)}
      {/* Add meal */}
      {!adding?<button className="dashed-btn" onClick={()=>{setAdding(true);setFoodSearch("");setSearchRes([]);setMacros({calories:"",protein:"",carbs:"",fat:"",fiber:""});setForm({name:"",time:"",description:""});setFormErr("");}}>+ ADD MEAL</button>:
      <div className="card" style={{padding:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div className="section-label" style={{marginBottom:0}}>ADD MEAL</div>
          <button onClick={()=>setAdding(false)} style={{background:"transparent",border:"none",color:"#ccc",fontSize:20,cursor:"pointer"}}>×</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,marginBottom:10}}>
          <input className="iStyle" placeholder="Meal name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/>
          <input className="iStyle" type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))} style={{width:90}}/>
        </div>
        <input className="iStyle" placeholder="🔍 Search — dal, egg, paneer, whey, roti..." value={foodSearch}

          style={{marginBottom:8}}/>

            setMacros({calories:String(food.cal),protein:String(food.p),carbs:String(food.c),fat:String(food.f),fiber:String(food.fi)});

          }} style={{padding:"10px 14px",cursor:"pointer",borderBottom:i<searchRes.length-1?"1px solid #f5f5f5":"none",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff"}}>

            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"'Syne',sans-serif",color:"#16a34a"}}>{food.cal}</div>
              <div style={{fontSize:8,fontFamily:"monospace",color:"#bbb"}}>kcal</div>
            </div>
          </div>)}

              const food=FOOD_DB.find(f=>f.name===nm);if(!food)return null;
              return <button key={lbl} onClick={()=>{setMacros({calories:String(food.cal),protein:String(food.p),carbs:String(food.c),fat:String(food.f),fiber:String(food.fi)});if(!form.name)setForm(f=>({...f,name:lbl,description:food.name}));setFoodSearch(food.name);setSearchRes([]);}} style={{fontSize:10,fontFamily:"monospace",background:"#f5f5f2",border:"1px solid #e8e8e8",borderRadius:20,padding:"5px 12px",cursor:"pointer",color:"#555"}}>{lbl}</button>;

        </div>}
        <div style={{background:"#fafafa",borderRadius:10,padding:12,marginBottom:10,border:"1px solid #f0f0f0"}}>
          <div style={{fontSize:9,fontFamily:"monospace",color:"#ccc",letterSpacing:1,marginBottom:8}}>MACROS {macros.calories?`· ${macros.calories} kcal`:"· enter or search above"}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {[["calories","Kcal","#f59e0b"],["protein","Prot","#16a34a"],["carbs","Carbs","#2563eb"],["fat","Fat","#ea580c"],["fiber","Fiber","#7c3aed"]].map(([k,lbl,col])=>
              <div key={k} style={{textAlign:"center"}}>
                <input type="number" value={macros[k]} onChange={e=>setMacros(m=>({...m,[k]:e.target.value}))}
                  style={{width:"100%",background:"#fff",border:`1px solid ${macros[k]?"#e8e8e8":"#f0f0f0"}`,borderRadius:6,padding:"6px 4px",fontSize:13,fontFamily:"'Syne',sans-serif",fontWeight:700,color:macros[k]?col:"#ccc",textAlign:"center",outline:"none"}}/>
                <div style={{fontSize:8,fontFamily:"monospace",color:"#bbb",marginTop:3}}>{lbl}</div>
              </div>)}
          </div>
        </div>
        {formErr&&<div style={{color:"#ef4444",fontSize:10,fontFamily:"monospace",marginBottom:8}}>{formErr}</div>}
        <button onClick={addMeal} style={{width:"100%",padding:11,borderRadius:8,border:"none",background:macros.calories?"#16a34a":"#e8e8e8",color:macros.calories?"#fff":"#bbb",fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",letterSpacing:1}}>+ ADD TO LOG</button>
      </div>}
    </>}

    {/* ── STEPS TAB ── */}

      {navBar}

        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[3000,5000,6000,8000,10000,12000].map(n=><button key={n} onClick={()=>{setStepInput(String(n));saveSteps({...stepsData,[viewDate]:n});}} style={{fontSize:10,fontFamily:"monospace",background:"#f5f5f2",border:"1px solid #e8e8e8",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:"#555"}}>{n/1000}k</button>)}
        </div>
      </div>
      {/* Weekly */}
      <div className="card" style={{background:weekSteps>=STEP_GOALS.week?"#dcfce7":"#fff",border:`1px solid ${weekSteps>=STEP_GOALS.week?"#86efac":"#ebebeb"}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:9,fontFamily:"monospace",color:weekSteps>=STEP_GOALS.week?"#15803d":"#bbb",letterSpacing:2,marginBottom:3}}>THIS WEEK · TARGET {STEP_GOALS.week.toLocaleString()}</div>
            <div style={{fontSize:28,fontWeight:800,fontFamily:"'Syne',sans-serif",color:weekSteps>=STEP_GOALS.week?"#15803d":"#1a1a1a"}}>{weekSteps.toLocaleString()}</div>
          </div>
          {weekSteps>=STEP_GOALS.week&&<div style={{fontSize:28}}>🟢</div>}
        </div>
        <div style={{height:6,background:"rgba(0,0,0,.06)",borderRadius:3,overflow:"hidden",marginBottom:12}}>
          <div style={{height:"100%",width:`${Math.min((weekSteps/STEP_GOALS.week)*100,100)}%`,background:weekSteps>=STEP_GOALS.week?"#22c55e":"#94a3b8",borderRadius:3}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {weekDates.map(d=>{
            const s=stepsData[d]||0,wk=[0,6].includes(new Date(d+"T12:00:00").getDay()),g=wk?STEP_GOALS.weekend:STEP_GOALS.day,met=s>=g,fut=d>TODAY;
            return <div key={d} onClick={()=>{if(!fut)setViewDate(d);}} style={{textAlign:"center",cursor:fut?"default":"pointer",opacity:fut?.3:1}}>
              <div style={{fontSize:8,fontFamily:"monospace",color:"#bbb",marginBottom:3}}>{new Date(d+"T12:00:00").toLocaleDateString("en-IN",{weekday:"short"}).slice(0,2).toUpperCase()}</div>
              <div style={{background:met?"#dcfce7":d===TODAY?"#f0fdf4":"#f5f5f2",border:met?"1.5px solid #86efac":d===TODAY?"1.5px solid #bbf7d0":"1.5px solid #ebebeb",borderRadius:8,padding:"6px 2px",minHeight:36,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontSize:10,fontWeight:700,fontFamily:"'Syne',sans-serif",color:met?"#15803d":d===TODAY?"#16a34a":"#555"}}>{s>0?(s>=1000?Math.round(s/1000)+"k":s):"·"}</div>
                {met&&<div style={{fontSize:8,color:"#22c55e"}}>✓</div>}
              </div>
            </div>;
          })}
        </div>
      </div>
      {/* Steps Calendar */}
      <div className="card">
        <div className="section-label">STEPS CALENDAR</div>
        <CalGrid year={calMonth.y} month={calMonth.m}
          onPrev={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()};})}
          onNext={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1);if(d<=new Date())return{y:d.getFullYear(),m:d.getMonth()};return p;})}
          renderDay={(day,y,m)=>{
            const ds=tods(y,m,day),s=stepsData[ds]||0,wk=[0,6].includes(new Date(ds+"T12:00:00").getDay()),g=wk?STEP_GOALS.weekend:STEP_GOALS.day,met=s>=g,sel=ds===viewDate,fut=ds>TODAY;
            return <div onClick={()=>{if(!fut)setViewDate(ds);}} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:8,fontSize:10,fontFamily:"monospace",cursor:fut?"default":"pointer",background:met?"#dcfce7":ds===TODAY?"#f0fdf4":"transparent",color:met?"#15803d":ds===TODAY?"#16a34a":fut?"#e0e0e0":"#555",fontWeight:sel?700:400,border:sel?"2px solid #16a34a":met?"2px solid #86efac":"2px solid transparent",gap:1}}>
              {day}{met&&<div style={{fontSize:7,color:"#22c55e"}}>✓</div>}{s>0&&!met&&<div style={{fontSize:7,color:"#94a3b8"}}>{Math.round(s/1000)}k</div>}
            </div>;
          }}/>
      </div>
    </>}

    {/* ── PROGRESS TAB ── */}
    {tab==="gym"&&<>
      <div className="card">
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:64,fontWeight:800,fontFamily:"'Syne',sans-serif",lineHeight:1,color:"#16a34a"}}>{gymData.sessions}</div>
          <div style={{fontSize:10,color:"#bbb",fontFamily:"monospace",letterSpacing:2}}>SESSIONS TOTAL</div>
        </div>
        {[{goal:GYM_JUNE,left:sessLeft70,days:dJ,pct:pJ,color:"#ea580c",label:"JUNE GOAL"},{goal:GYM_YEAR,left:sessLeft200,days:dY,pct:pY,color:"#2563eb",label:"YEAR GOAL"}].map(g=>
          <div key={g.goal} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:"monospace",color:"#999",marginBottom:5}}>
              <span>{g.label} <span style={{color:g.color,fontWeight:700}}>{g.goal}</span></span>
              <span>{g.pct>=100?<span style={{color:"#16a34a"}}>✓ DONE</span>:`${g.left} left · ${g.days}d`}</span>
            </div>
            <div style={{height:8,background:"#f0f0f0",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${g.pct}%`,background:g.pct>=100?"#16a34a":g.color,borderRadius:4,transition:"width .5s"}}/>
            </div>
            {g.left>0&&g.days>0&&<div style={{fontSize:10,color:"#bbb",fontFamily:"monospace",marginTop:4}}>→ 1 session every <span style={{color:g.color}}>{(g.days/g.left).toFixed(1)} days</span></div>}
          </div>)}
      </div>
      <div className="card">
        <div className="section-label">SESSION CALENDAR · TAP TO MARK</div>
        <CalGrid year={calMonth.y} month={calMonth.m}
          onPrev={()=>setCalMonth(p=>{const d=new Date(p.y,p.m-1);return{y:d.getFullYear(),m:d.getMonth()};})}
          onNext={()=>setCalMonth(p=>{const d=new Date(p.y,p.m+1);if(d<=new Date())return{y:d.getFullYear(),m:d.getMonth()};return p;})}
          renderDay={(day,y,m)=>{
            const ds=tods(y,m,day),on=gymData.gymDates[ds],wp=workoutLog[ds]?WP[workoutLog[ds].plan]:null,fut=ds>TODAY;
            return <div onClick={()=>{if(!fut)toggleGym(ds);}} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:8,fontSize:10,fontFamily:"monospace",cursor:fut?"default":"pointer",background:on?"#dcfce7":ds===TODAY?"#f0fdf4":"transparent",color:on?"#15803d":ds===TODAY?"#16a34a":fut?"#e0e0e0":"#555",fontWeight:on?700:400,border:on?"2px solid #86efac":ds===TODAY?"2px solid #bbf7d0":"2px solid transparent",userSelect:"none",gap:1}}>
              {on?"✓":day}{wp&&<div style={{fontSize:7,color:wp.color}}>{wp.emoji}</div>}
            </div>;
          }}/>
        <div style={{marginTop:10,fontSize:10,fontFamily:"monospace",color:"#bbb",textAlign:"center"}}>{Object.values(gymData.gymDates).filter(Boolean).length} via calendar · 38 pre-existing</div>
      </div>
    </>}

    {/* ── HISTORY TAB ── */}
    {tab==="history"&&<>
      <div className="section-label">PAST DAYS</div>
      {Object.keys(allDays).sort((a,b)=>b.localeCompare(a)).map(date=>{
        const ms=allDays[date]?.meals||[],cal=ms.reduce((a,m)=>a+(m.macros.calories||0),0),prot=ms.reduce((a,m)=>a+(m.macros.protein||0),0),fib=ms.reduce((a,m)=>a+(m.macros.fiber||0),0),col=foodColor(date),wp=workoutLog[date]?WP[workoutLog[date].plan]:null;
        return <div key={date} onClick={()=>{setViewDate(date);setTab("food");}} style={{background:col?col.bg:"#fff",border:`1px solid ${col?col.dot+"44":"#ebebeb"}`,borderRadius:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,.03)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,color:col?col.text:date===TODAY?"#16a34a":"#1a1a1a"}}>{date===TODAY?"Today":fmtDate(date)}</div>
                {wp&&<span style={{fontSize:9,background:wp.light,color:wp.color,border:`1px solid ${wp.border}`,borderRadius:4,padding:"1px 6px",fontFamily:"monospace"}}>{wp.emoji} {wp.label}</span>}
                {gymData.gymDates[date]&&!wp&&<span style={{fontSize:9,background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0",borderRadius:4,padding:"1px 6px",fontFamily:"monospace"}}>🏋️ gym</span>}
              </div>
              <div style={{fontFamily:"monospace",fontSize:10,color:"#aaa",marginTop:2}}>{ms.length} meals · {prot}g protein · {fib}g fiber{stepsData[date]?` · ${stepsData[date].toLocaleString()} steps`:""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:col?col.text:"#1a1a1a"}}>{cal}</div>
              <div style={{fontSize:8,color:"#bbb",fontFamily:"monospace"}}>KCAL</div>
            </div>
          </div>
          <div style={{marginTop:8,height:3,background:"rgba(0,0,0,.06)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min((cal/DAILY_GOALS.calories)*100,100)}%`,background:col?col.dot:"#e0e0e0",borderRadius:2}}/>
          </div>
        </div>;
      })}
      {Object.keys(allDays).length===0&&<div style={{textAlign:"center",fontFamily:"monospace",fontSize:11,color:"#ccc",padding:"40px 0"}}>No history yet.</div>}
    </>}

    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
